<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LA-YEE Web Translate</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: #1f2937;
      background: #fff;
    }
    .header {
      padding: 16px 16px 12px;
      border-bottom: 1px solid #f3f4f6;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 600;
    }
    .header-tagline {
      font-size: 12px;
      color: #6b7280;
      margin-top: 2px;
    }
    .share-card {
      margin-top: 12px;
      padding: 10px 12px;
      background: linear-gradient(135deg, #eff6ff 0%, #f0fdf4 100%);
      border: 1px solid #bfdbfe;
      border-radius: 10px;
    }
    .share-card-head {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 8px;
    }
    .share-icon {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: #fff;
      color: #2563eb;
      box-shadow: 0 1px 2px rgba(37, 99, 235, 0.12);
    }
    .share-icon svg {
      width: 16px;
      height: 16px;
    }
    .share-copy-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #1e40af;
      line-height: 1.3;
    }
    .share-hint {
      display: block;
      margin-top: 2px;
      font-size: 11px;
      color: #64748b;
      line-height: 1.4;
    }
    .share-url {
      display: block;
      width: 100%;
      margin-bottom: 8px;
      padding: 7px 10px;
      font-size: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-weight: 500;
      color: #1d4ed8;
      text-align: center;
      background: #fff;
      border: 1px dashed #93c5fd;
      border-radius: 8px;
      cursor: pointer;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .share-url:hover,
    .share-url:focus {
      border-color: #3b82f6;
      background: #f8fbff;
    }
    .share-copy-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 1px 3px rgba(37, 99, 235, 0.35);
      transition: transform 0.1s, box-shadow 0.15s, background 0.15s;
    }
    .share-copy-btn:hover {
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      box-shadow: 0 2px 6px rgba(37, 99, 235, 0.4);
    }
    .share-copy-btn:active { transform: scale(0.98); }
    .share-copy-btn svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }
    .share-card.copied {
      border-color: #86efac;
      background: linear-gradient(135deg, #ecfdf5 0%, #f0fdf4 100%);
    }
    .share-card.copied .share-copy-label { color: #15803d; }
    .share-card.copied .share-url {
      color: #15803d;
      border-color: #86efac;
    }
    .share-copy-btn.copied {
      background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
      box-shadow: 0 1px 3px rgba(22, 163, 74, 0.35);
    }
    .share-copy-btn.copied:hover {
      background: linear-gradient(135deg, #16a34a 0%, #15803d 100%);
    }
    .referral-card {
      margin-bottom: 12px;
    }
    .referral-card.hidden {
      display: none;
    }
    .referral-code-display {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }
    .body { padding: 16px; }
    .status-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      margin-bottom: 12px;
      background: #f9fafb;
      border-radius: 8px;
      font-size: 12px;
      color: #6b7280;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #d1d5db;
    }
    .status-dot.connected { background: #22c55e; }
    .status-dot.connecting,
    .status-dot.reconnecting { background: #f59e0b; }
    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #374151;
      margin-bottom: 4px;
    }
    input, select {
      width: 100%;
      padding: 8px 10px;
      margin-bottom: 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, select:focus { border-color: #3b82f6; }
    button {
      width: 100%;
      padding: 9px;
      font-size: 13px;
      font-weight: 500;
      color: #fff;
      background: #3b82f6;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #2563eb; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    button.secondary {
      background: #f3f4f6;
      color: #374151;
      margin-top: 8px;
    }
    button.secondary:hover { background: #e5e7eb; }
    button.link {
      width: auto;
      padding: 0;
      margin-top: 10px;
      background: none;
      color: #3b82f6;
      font-weight: 400;
      font-size: 12px;
    }
    button.link:hover { background: none; text-decoration: underline; }
    .auth-form.hidden { display: none; }
    .success-msg {
      color: #16a34a;
      font-size: 12px;
      margin-bottom: 8px;
      display: none;
      line-height: 1.5;
    }
    .success-msg.visible { display: block; }
    .verify-pending { display: none; text-align: center; }
    .verify-pending.visible { display: block; }
    .verify-pending p { color: #6b7280; font-size: 13px; line-height: 1.6; margin-bottom: 12px; }
    .verify-email { font-weight: 500; color: #111827; word-break: break-all; }
    .error {
      color: #dc2626;
      font-size: 12px;
      margin-bottom: 8px;
      display: none;
    }
    .error.visible { display: block; }
    .logged-in { display: none; }
    .logged-in.visible { display: block; }
    .user-email {
      font-weight: 500;
      color: #111827;
      margin-bottom: 12px;
    }
    .hint {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #f3f4f6;
      font-size: 11px;
      color: #9ca3af;
      line-height: 1.5;
    }
    kbd {
      display: inline-block;
      padding: 1px 5px;
      font-size: 10px;
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>LA-YEE Web Translate</h1>
    <p class="header-tagline">选中即译</p>
    <div class="share-card" id="shareCard">
      <div class="share-card-head">
        <span class="share-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
          </svg>
        </span>
        <div>
          <span class="share-copy-label">推荐给朋友</span>
          <span class="share-hint">复制官网链接，粘贴发给好友一起体验</span>
        </div>
      </div>
      <input type="text" class="share-url" id="siteUrl" readonly value="http://www.la-yee.com" aria-label="官网链接，点击可选中" />
      <button type="button" class="share-copy-btn" id="copySiteUrlBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        <span id="copySiteUrlLabel">复制链接分享</span>
      </button>
    </div>
  </div>
  <div class="body">
    <div class="status-bar">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">未连接</span>
    </div>

    <div class="logged-in" id="loggedInView">
      <div class="user-email" id="userEmail"></div>

      <div class="share-card referral-card hidden" id="referralCard">
        <div class="share-card-head">
          <span class="share-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 12v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-6"/>
              <path d="M12 3v12"/><path d="m8 11 4 4 4-4"/>
            </svg>
          </span>
          <div>
            <span class="share-copy-label">我的邀请码</span>
            <span class="share-hint" id="referralStats">好友注册时填写，一起解锁 Plus 权益</span>
          </div>
        </div>
        <input type="text" class="share-url referral-code-display" id="referralCodeDisplay" readonly aria-label="我的邀请码，点击复制" />
        <button type="button" class="share-copy-btn" id="copyReferralBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          <span id="copyReferralLabel">复制邀请信息</span>
        </button>
      </div>

      <label for="targetLang">目标语言</label>
      <select id="targetLang">
        <option value="zh">中文</option>
        <option value="en">English</option>
        <option value="ja">日本語</option>
        <option value="ko">한국어</option>
        <option value="fr">Français</option>
        <option value="de">Deutsch</option>
      </select>

      <label for="serverUrl">服务器地址</label>
      <input type="url" id="serverUrl" placeholder="https://api.la-yee.com" />

      <button class="secondary" id="logoutBtn">退出登录</button>
    </div>

    <form class="login-form auth-form" id="loginForm">
      <div class="error" id="loginError"></div>

      <label for="email">邮箱</label>
      <input type="email" id="email" required autocomplete="email" />

      <label for="password">密码</label>
      <input type="password" id="password" required autocomplete="current-password" />

      <label for="serverUrlLogin">服务器地址</label>
      <input type="url" id="serverUrlLogin" placeholder="https://api.la-yee.com" />

      <button type="submit" id="loginBtn">登录</button>
      <button type="button" class="link" id="showRegisterBtn">没有帐号？注册</button>
    </form>

    <form class="auth-form hidden" id="registerForm">
      <div class="error" id="registerError"></div>

      <label for="registerEmail">邮箱</label>
      <input type="email" id="registerEmail" required autocomplete="email" />

      <label for="registerPassword">密码</label>
      <input type="password" id="registerPassword" required minlength="6" autocomplete="new-password" />

      <label for="referralCode">邀请码（选填）</label>
      <input type="text" id="referralCode" autocomplete="off" placeholder="如有邀请码请填写" />

      <label for="serverUrlRegister">服务器地址</label>
      <input type="url" id="serverUrlRegister" placeholder="https://api.la-yee.com" />

      <button type="submit" id="registerBtn">注册</button>
      <button type="button" class="link" id="showLoginBtn">已有帐号？登录</button>
    </form>

    <div class="verify-pending" id="verifyPendingView">
      <p>验证邮件已发送至<br /><span class="verify-email" id="verifyPendingEmail"></span></p>
      <p>请点击邮件中的链接完成验证，然后登录使用。</p>
      <div class="success-msg" id="resendSuccess"></div>
      <div class="error" id="resendError"></div>
      <button type="button" id="resendBtn">重新发送验证邮件</button>
      <button type="button" class="link" id="backToLoginBtn">返回登录</button>
    </div>

    <div class="hint">
      选中文本后点击「翻译」按钮，或按 <kbd>Alt</kbd>+<kbd>T</kbd> 快捷键翻译。
    </div>
  </div>
  <script type="module" src="popup.js"></script>
</body>
</html>
