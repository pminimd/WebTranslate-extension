name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build extension
        run: npm run build

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Package install zip
        run: |
          mkdir -p release/web-translate
          cp -r dist/* release/web-translate/
          cd release && zip -r "../web-translate-v${{ steps.version.outputs.version }}.zip" web-translate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: web-translate-v${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
